name: Build Voice Announcer EXE and Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.0)'
        required: true
        default: 'v_latest'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Windowsの公式ダウンローダーを使用して、モデルや辞書一式をダウンロード
      - name: Download VOICEVOX Core Assets
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/VOICEVOX/voicevox_core/releases/download/0.16.4/download-windows-x64.exe -OutFile ./download.exe
          "y" | ./download.exe -o ./example/python --exclude c-api

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Windows向けの wheel と onnxruntime を導入
          pip install https://github.com/VOICEVOX/voicevox_core/releases/download/0.16.4/voicevox_core-0.16.4-cp310-abi3-win_amd64.whl
          pip install onnxruntime

      # WindowsのPyInstallerでEXEをビルド（辞書やモデルは内蔵しない）
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --console `
            --name voice-announcer `
            --add-binary "example/python/onnxruntime/lib/voicevox_onnxruntime.dll;." `
            main.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Announcer-Windows
          path: dist/voice-announcer.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linuxの公式ダウンローダーを使用して、モデルや辞書一式をダウンロード
      - name: Download VOICEVOX Core Assets
        run: |
          curl -L -o ./download https://github.com/VOICEVOX/voicevox_core/releases/download/0.16.4/download-linux-x64
          chmod +x ./download
          echo y | ./download -o ./example/python --exclude c-api

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Linux向けの wheel と onnxruntime を導入
          pip install https://github.com/VOICEVOX/voicevox_core/releases/download/0.16.4/voicevox_core-0.16.4-cp310-abi3-manylinux_2_34_x86_64.whl
          pip install onnxruntime

      # LinuxのPyInstallerでバイナリをビルド（辞書やモデルは内蔵しない）
      # LinuxのPyInstallerはパス区切りに「:」を使用します
      - name: Build Binary with PyInstaller
        run: |
          pyinstaller --onefile --console \
            --name voice-announcer \
            --add-binary "example/python/onnxruntime/lib/libvoicevox_onnxruntime.so.1.17.3:example/python/onnxruntime/lib" \
            main.py

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Announcer-Linux
          path: dist/voice-announcer
 
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
 
    permissions:
      contents: write
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Voice-Announcer-Windows
          path: ./dist-windows
 
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Voice-Announcer-Linux
          path: ./dist-linux
 
      - name: Set Release Tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
 
      - name: Archive Assets
        run: |
          mkdir -p release-assets
          zip -j release-assets/voice-announcer-windows-${{ env.RELEASE_TAG }}.zip ./dist-windows/voice-announcer.exe
          zip -j release-assets/voice-announcer-linux-${{ env.RELEASE_TAG }}.zip ./dist-linux/voice-announcer
 
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "統合アナウンス・コントロールパネル ${{ env.RELEASE_TAG }}" \
            --notes "リリースノートはWeb UIから直接確認してください。" \
            --clobber \
            release-assets/voice-announcer-windows-${{ env.RELEASE_TAG }}.zip \
            release-assets/voice-announcer-linux-${{ env.RELEASE_TAG }}.zip